name: Devin PR Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  detect-devin-pr:
    if: github.event.pull_request.user.login == 'devin-ai-integration[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Label Devin PR
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['devin-automated']
            });

      - name: Comment on Devin PR
        if: github.event.action == 'opened'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🤖 This PR was created by Devin as part of an automated remediation workflow. Please review the changes carefully before merging.'
            });
