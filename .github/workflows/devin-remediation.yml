name: Devin Remediation Workflow

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  trigger-devin:
    if: github.event.label.name == 'devin-remediate'
    runs-on: ubuntu-latest

    steps:
      - name: Create Devin session
        id: devin
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PROMPT=$(jq -n \
            --arg repo "$REPO" \
            --arg title "$ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --arg body "$ISSUE_BODY" \
            '"You are working in the GitHub repository \($repo), a fork of Apache Superset.\n\nRemediate this issue:\n\nTitle: \($title)\nIssue URL: \($url)\n\n\($body)\n\nRequirements:\n- investigate relevant code paths\n- make minimal, safe changes\n- run targeted tests\n- open a pull request against main, referencing the issue\n- summarise validation steps in the PR description"')

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg title "Remediate #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --arg tag1 "maintenance-copilot-v2" \
            --arg tag2 "issue-${ISSUE_NUMBER}" \
            '{prompt: $prompt, title: $title, tags: [$tag1, $tag2], idempotent: false}')

          HTTP_RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          echo "Devin API status: $STATUS"
          echo "Devin API body: $BODY"

          if [[ "$STATUS" != "200" && "$STATUS" != "201" ]]; then
            echo "::error::Failed to create Devin session (HTTP $STATUS): $BODY"
            exit 1
          fi

          SESSION_URL=$(echo "$BODY" | jq -r '.url // empty')
          SESSION_ID=$(echo "$BODY" | jq -r '.session_id // empty')

          echo "session_url=$SESSION_URL" >> "$GITHUB_OUTPUT"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Comment Devin session URL on issue
        if: success() && steps.devin.outputs.session_url != ''
        uses: actions/github-script@v7
        env:
          SESSION_URL: ${{ steps.devin.outputs.session_url }}
          SESSION_ID: ${{ steps.devin.outputs.session_id }}
        with:
          script: |
            const url = process.env.SESSION_URL;
            const id = process.env.SESSION_ID;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Devin remediation session started.\n\n- Session: ${url}\n- ID: \`${id}\`\n\nDevin will open a pull request against \`main\` when remediation completes.`
            });

      - name: Comment failure on issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Failed to start Devin remediation session. See the [workflow run](${runUrl}) for details.`
            });