name: Devin Remediation Workflow

on:
  issues:
    types: [labeled]

jobs:
  trigger-devin:
    if: github.event.label.name == 'devin-remediate'
    runs-on: ubuntu-latest

    steps:
      - name: Create Devin session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          curl -X POST "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"prompt\": \"You are working in my fork of Apache Superset. Remediate this GitHub issue: $ISSUE_TITLE\n\nIssue URL: $ISSUE_URL\n\nIssue body:\n$ISSUE_BODY\n\nPlease investigate, implement the smallest safe fix, run targeted tests, and open a pull request for human review.\"
            }"